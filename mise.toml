[settings]
experimental = true
lockfile = true

[tools]
# pebble-tool requires Python >3.9,<3.14; pin 3.13 to avoid system Python 3.14+
python = "3.13"

# https://developer.rebble.io/sdk/
# https://github.com/coredevices/pebble-tool
# https://mise.jdx.dev/dev-tools/backends/pipx.html
"pipx:pebble-tool" = "5.0.38"

# https://deno.com/
deno = "2.1.4"

# https://github.com/supabase/cli
# https://mise.jdx.dev/dev-tools/backends/aqua.html
"aqua:supabase/cli" = "2.98.2"

# https://github.com/linebender/resvg
# https://mise.jdx.dev/dev-tools/backends/aqua.html
resvg = "0.47.0"
pipx = "latest"

[env]
_.file = ".env"

[tasks.prepare-package]
description = "Prepare package.json from profile (default: dev)"
run = "scripts/prepare-package.sh"

[tasks.telemetry-serve]
description = "Serve telemetry ingest function locally"
run = "supabase functions serve telemetry-ingest --env-file .env"

[tasks.preview-config]
description = "Render a browser-openable preview of the config UI to build/ (args: [out] [platform], default basalt). Open the file in a browser instead of the emulator."
alias = "preview"
run = "node scripts/preview-config-page.js"

[tasks.clean]
description = "Clean build artifacts"
run = "pebble clean"

[tasks.build]
description = "Build PBW (default: dev)"
run = "scripts/build.sh"

[tasks.rebuild]
description = "Clean and rebuild PBW"
run = "pebble clean && scripts/build.sh"

[tasks.install-phone]
description = "Build and install dev build on phone"
alias = "install"
run = "scripts/install-phone.sh"

[tasks.install-cloud]
description = "Build and install on CloudPebble (default: dev)"
alias = "cloud"
run = "scripts/install-cloud.sh"

[tasks.install-emulator]
description = "Build and install on emulator (default profile: dev, emulator: basalt)"
alias = "emu"
run = "pebble wipe && scripts/install-emulator.sh"

[tasks.config-emulator]
description = "Open the running emulator app's config (settings) page in a browser (default: basalt)"
alias = "config"
run = "scripts/config-emulator.sh"

[tasks.kill-emulator]
description = "Stop running emulator and phone simulator"
alias = "kill"
run = "pebble kill"

[tasks.capture-screenshots]
description = "Build dev .pbw and capture screenshots for all platforms (args: version [fixture], e.g. v1.0.0 berlin)"
run = "scripts/capture-screenshots.sh"

[tasks.screenshot-phone]
description = "Take a screenshot from phone"
run = "scripts/screenshot-phone.sh"

[tasks.screenshot-emulator]
description = "Take a screenshot from emulator (default: basalt)"
alias = "screenshot"
run = "scripts/screenshot-emulator.sh"

[tasks.composite-screenshot]
description = "Composite a screenshot PNG into an SVG Pebble frame"
run = "screenshot/composite_svg.sh"

[tasks.composite]
description = "Composite the README hero shots from a version's store captures"
run = "scripts/composite-version.sh"

[tasks.gif]
description = "Assemble a time-lapse GIF from captured frames (args: version platform [fps])"
run = "scripts/assemble-gif.sh"

[tasks.capture-timelapse]
description = "Capture two-phase (forecast + radar/wind) time-lapse frames on all five platforms (args: version)"
run = "scripts/capture-timelapse.sh"

[tasks.test]
description = "Run the Node test suite"
# Regenerate page.generated.js first: it's a gitignored build artifact, and
# tests require it transitively (clay-settings -> settings -> page.generated).
run = [
  "node scripts/build-config-page.js",
  "node --test",
]
